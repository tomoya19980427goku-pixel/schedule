<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>ERINA Zoom予定表</title>

    <meta
        name="theme-color"
        content="#0d6efd">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default">

    <meta
        name="apple-mobile-web-app-title"
        content="ERINA Zoom">

    <link
        rel="manifest"
        href="manifest.json">

    <link
        rel="apple-touch-icon"
        href="images/icon-192.png">

    <link
        rel="icon"
        href="images/icon-192.png">

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="container">
    <header>

    <h1>

        ERINA Zoom予定表

    </h1>

</header>
<section class="home-section">

    <h2>

        📅 今日のZoom

    </h2>

    <div id="todayEvents">

    </div>

</section>
<section class="home-section">

    <h2>

        ⏭ 次回Zoom

    </h2>

    <div id="nextEvent">

    </div>

</section>
<section class="calendar-section">

    <div class="calendar-header">

        <button id="prevMonth">

            ◀

        </button>

        <h2 id="monthTitle">

            2026年7月

        </h2>

        <button id="nextMonth">

            ▶

        </button>

    </div>

    <div id="calendar">

    </div>

</section>
<!-- ==========================
     イベント詳細モーダル
========================== -->

<div
    id="eventModal"
    class="modal">

    <div class="modal-content">

        <button
            id="closeModal"
            class="close-button">

            ×

        </button>

        <div id="modalBody">

        </div>

    </div>

</div>
<footer>

    <p>

        © 2026 ERINA Zoom Schedule

    </p>

</footer>
<script src="app.js"></script>
</div>

</body>

</html>
